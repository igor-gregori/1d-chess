<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xadrez 1D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #3b2f2f; color: #f5e6d3; }
h1 { margin-bottom: 0.5rem; font-size: 1.8rem; }
#status { margin: 1rem 0; font-size: 1.2rem; min-height: 1.5em; }
#board { display: flex; margin: 1rem 0; border: 4px solid #2e1a0e; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.square { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s; user-select: none; }
.square.light { background: #f0d9b5; }
.square.dark { background: #b58863; }
.square.selected { background: #f6f669 !important; }
.square.target { background: #829769 !important; }
.square.check { background: #e84040 !important; }
.square img { width: 62px; height: 62px; pointer-events: none; }
#controls { margin-top: 1rem; display: flex; gap: 0.5rem; }
button { padding: 0.5rem 1.2rem; font-size: 1rem; border: 1px solid #5a3e28; border-radius: 4px; cursor: pointer; background: #5a3e28; color: #f5e6d3; transition: background 0.2s; }
button:hover { background: #7a5438; }
#info { margin-top: 1.5rem; max-width: 500px; text-align: center; font-size: 0.85rem; opacity: 0.7; }
</style>
</head>
<body>
<h1>♟ Xadrez 1D</h1>
<div id="status">Sua vez (Brancas)</div>
<div id="board"></div>
<div id="controls">
  <button onclick="claimDraw()">Empate</button>
  <button onclick="restart()">Reiniciar</button>
</div>
<div id="info">Clique em uma peça branca para selecioná-la, depois clique no destino. Vença dando xeque-mate no rei preto!</div>

<script>
const PIECE_SVG = { K:'pieces/wk.svg', N:'pieces/wn.svg', R:'pieces/wr.svg', k:'pieces/bk.svg', n:'pieces/bn.svg', r:'pieces/br.svg' };
const SFX = { move: new Audio('sounds/move1.ogg'), capture: new Audio('sounds/capture1.ogg'), check: new Audio('sounds/check1.ogg'), win: new Audio('sounds/win1.ogg'), draw: new Audio('sounds/draw1.ogg') };
function playSound(name) { const s = SFX[name]; if(s){ s.currentTime=0; s.play().catch(()=>{}); } }

const INITIAL = ['K','N','R', null, null, 'r','n','k'];
let board, turn, selected, targets, history, gameOver;

function init() {
  board = [...INITIAL];
  turn = 'w';
  selected = -1;
  targets = [];
  history = [boardKey()];
  gameOver = false;
  render();
  setStatus("Sua vez (Brancas)");
}

function boardKey() { return board.map(p => p || '.').join(''); }
function isWhite(p) { return p && p === p.toUpperCase(); }
function isBlack(p) { return p && p === p.toLowerCase(); }
function colorOf(p) { return p ? (isWhite(p) ? 'w' : 'b') : null; }

function getMoves(pos, brd) {
  const p = brd[pos];
  if (!p) return [];
  const color = colorOf(p);
  const type = p.toUpperCase();
  const moves = [];
  if (type === 'K') {
    for (const d of [-1, 1]) { const t = pos+d; if (t>=0 && t<8 && colorOf(brd[t])!==color) moves.push(t); }
  } else if (type === 'N') {
    for (const d of [-2, 2]) { const t = pos+d; if (t>=0 && t<8 && colorOf(brd[t])!==color) moves.push(t); }
  } else if (type === 'R') {
    for (const d of [-1, 1]) { let t=pos+d; while(t>=0&&t<8){ if(colorOf(brd[t])===color) break; moves.push(t); if(brd[t]) break; t+=d; } }
  }
  return moves;
}

function kingPos(color, brd) { return brd.indexOf(color === 'w' ? 'K' : 'k'); }

function isInCheck(color, brd) {
  const kp = kingPos(color, brd);
  if (kp === -1) return true;
  for (let i = 0; i < 8; i++) {
    if (colorOf(brd[i]) !== color && brd[i] && getMoves(i, brd).includes(kp)) return true;
  }
  return false;
}

function legalMoves(color, brd) {
  const moves = [];
  for (let i = 0; i < 8; i++) {
    if (colorOf(brd[i]) === color) {
      for (const t of getMoves(i, brd)) {
        const nb = [...brd]; nb[t] = nb[i]; nb[i] = null;
        if (!isInCheck(color, nb)) moves.push([i, t]);
      }
    }
  }
  return moves;
}

function insufficientMaterial(brd) { return brd.every(p => !p || p.toUpperCase() === 'K'); }
function threefoldRepetition() { const key = boardKey(); return history.filter(h => h === key).length >= 3; }

function checkGameEnd() {
  const moves = legalMoves(turn, board);
  if (moves.length === 0) {
    gameOver = true;
    if (isInCheck(turn, board)) {
      setStatus(turn === 'w' ? '✗ Xeque-mate! Pretas vencem.' : '✓ Xeque-mate! Você venceu!');
      playSound(turn === 'w' ? 'check' : 'win');
    } else {
      setStatus('½ Empate por afogamento.');
      playSound('draw');
    }
    return true;
  }
  if (insufficientMaterial(board)) { gameOver = true; setStatus('½ Empate — material insuficiente.'); playSound('draw'); return true; }
  if (threefoldRepetition()) { gameOver = true; setStatus('½ Empate — repetição tripla.'); playSound('draw'); return true; }
  return false;
}

function evaluate(brd) {
  const val = { R:50, N:30, K:900, r:-50, n:-30, k:-900 };
  let score = 0;
  for (const p of brd) { if (p) score += val[p] || 0; }
  score += legalMoves('w', brd).length * 2 - legalMoves('b', brd).length * 2;
  return score;
}

function minimax(brd, depth, alpha, beta, maximizing) {
  const color = maximizing ? 'w' : 'b';
  const moves = legalMoves(color, brd);
  if (moves.length === 0) return isInCheck(color, brd) ? (maximizing ? -10000+(10-depth) : 10000-(10-depth)) : 0;
  if (insufficientMaterial(brd)) return 0;
  if (depth === 0) return evaluate(brd);
  let best = maximizing ? -Infinity : Infinity;
  for (const [f, t] of moves) {
    const nb = [...brd]; nb[t] = nb[f]; nb[f] = null;
    const val = minimax(nb, depth-1, alpha, beta, !maximizing);
    if (maximizing) { best = Math.max(best, val); alpha = Math.max(alpha, val); }
    else { best = Math.min(best, val); beta = Math.min(beta, val); }
    if (beta <= alpha) break;
  }
  return best;
}

function aiMove() {
  const moves = legalMoves('b', board);
  if (moves.length === 0) return;
  let bestScore = Infinity, bestMoves = [];
  for (const [f, t] of moves) {
    const nb = [...board]; nb[t] = nb[f]; nb[f] = null;
    const score = minimax(nb, 8, -Infinity, Infinity, true);
    if (score < bestScore) { bestScore = score; bestMoves = [[f, t]]; }
    else if (score === bestScore) bestMoves.push([f, t]);
  }
  const [f, t] = bestMoves[Math.floor(Math.random() * bestMoves.length)];
  const isCapture = board[t] !== null;
  board[t] = board[f]; board[f] = null;
  turn = 'w';
  history.push(boardKey());
  if (!checkGameEnd()) {
    const inCheck = isInCheck('w', board);
    if (inCheck) playSound('check');
    else if (isCapture) playSound('capture');
    else playSound('move');
    setStatus(inCheck ? "Xeque! Sua vez." : "Sua vez (Brancas)");
  }
  render();
}

function makeMove(from, to) {
  const isCapture = board[to] !== null;
  board[to] = board[from]; board[from] = null;
  turn = 'b';
  history.push(boardKey());
  selected = -1; targets = [];
  if (!checkGameEnd()) {
    if (isInCheck('b', board)) playSound('check');
    else if (isCapture) playSound('capture');
    else playSound('move');
    setStatus("IA pensando...");
    render();
    setTimeout(aiMove, 100);
  } else { render(); }
}

function handleClick(i) {
  if (gameOver || turn !== 'w') return;
  if (targets.includes(i)) { makeMove(selected, i); return; }
  if (board[i] && isWhite(board[i])) {
    selected = i;
    targets = legalMoves('w', board).filter(([f]) => f === i).map(([, t]) => t);
  } else { selected = -1; targets = []; }
  render();
}

function render() {
  const el = document.getElementById('board');
  const inCheck = isInCheck(turn, board);
  const kp = kingPos(turn, board);
  el.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const sq = document.createElement('div');
    sq.className = 'square ' + (i % 2 === 0 ? 'light' : 'dark');
    if (i === selected) sq.classList.add('selected');
    if (targets.includes(i)) sq.classList.add('target');
    if (inCheck && i === kp) sq.classList.add('check');
    if (board[i]) {
      const img = document.createElement('img');
      img.src = PIECE_SVG[board[i]];
      img.alt = board[i];
      sq.appendChild(img);
    }
    sq.onclick = () => handleClick(i);
    el.appendChild(sq);
  }
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function claimDraw() {
  if (gameOver) return;
  if (threefoldRepetition()) { gameOver = true; setStatus('½ Empate reclamado — repetição tripla.'); playSound('draw'); render(); }
  else setStatus('Não há empate disponível. Sua vez.');
}

function restart() { init(); }
init();
</script>
</body>
</html>
